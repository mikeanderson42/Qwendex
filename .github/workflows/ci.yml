name: CI

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python-floor:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install required search runtime
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends ripgrep

      - name: Install pinned validation tools
        run: python3 -m pip install --disable-pip-version-check jsonschema==4.26.0 pytest==9.0.3 ruff==0.15.20

      - name: Validate published config schema on Python 3.11
        run: python3 scripts/validate_qwendex_config.py --json

      - name: Compile and test the minimum Python runtime
        shell: bash
        run: |
          mapfile -d '' python_files < <(find scripts tests -type f -name '*.py' -print0)
          python3 -m py_compile "${python_files[@]}"
          python3 -m ruff check scripts tests --ignore E501
          python3 -m pytest -q

  verify:
    needs: python-floor
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install required search runtime
        run: sudo apt-get update && sudo apt-get install --yes --no-install-recommends ripgrep

      - name: Install validation tools
        run: python3 -m pip install --disable-pip-version-check jsonschema==4.26.0 pytest==9.0.3 ruff==0.15.20

      - name: Compile all Python
        shell: bash
        run: |
          mapfile -d '' python_files < <(find scripts tests -type f -name '*.py' -print0)
          python3 -m py_compile "${python_files[@]}"

      - name: Lint Python
        run: python3 -m ruff check scripts tests --ignore E501

      - name: Validate tracked JSON
        shell: bash
        run: |
          while IFS= read -r -d '' path; do
            python3 -m json.tool "$path" >/dev/null
          done < <(git ls-files -z -- '*.json')

      - name: Validate published Qwendex config schema
        run: python3 scripts/validate_qwendex_config.py --json

      - name: Check tracked Bash syntax
        shell: bash
        run: |
          while IFS= read -r -d '' path; do
            if [[ -f "$path" ]] && head -n 1 "$path" | grep -qE '^#!.*\b(bash|sh)\b'; then
              bash -n "$path"
            fi
          done < <(git ls-files -z)

      - name: Run full test suite
        run: python3 -m pytest -q

      - name: Verify Manager production and immutable-runtime contracts
        run: |
          python3 -m pytest -q \
            tests/smoke/test_qwendex_manager_production.py \
            tests/smoke/test_qwendex_runtime_generations.py

      - name: Run strict public surface checks
        env:
          QWENDEX_STATE_DB: ${{ runner.temp }}/qwendex-ci.sqlite
          QWENDEX_RESULTS_ROOT: ${{ runner.temp }}/qwendex-results
        run: |
          scripts/qwendex check --health-mode strict --json
          scripts/qwendex doctor --health-mode strict --json

      - name: Scan the actual tracked release artifact
        env:
          QWENDEX_ARTIFACT_REPORT: ${{ runner.temp }}/qwendex-artifact-contract.json
        run: |
          python3 - <<'PY'
          import importlib.util
          import json
          import os
          import subprocess
          from pathlib import Path

          root = Path.cwd()
          module_path = root / "scripts" / "qwendex_release_gate.py"
          spec = importlib.util.spec_from_file_location("qwendex_release_gate", module_path)
          if spec is None or spec.loader is None:
              raise SystemExit("could not load release artifact contract")
          gate = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(gate)
          commit = subprocess.run(
              ["git", "rev-parse", "HEAD"], text=True, capture_output=True, check=True
          ).stdout.strip()
          tree = subprocess.run(
              ["git", "rev-parse", "HEAD^{tree}"], text=True, capture_output=True, check=True
          ).stdout.strip()
          contract, blockers = gate.artifact_contract(root, commit)
          payload = {
              "schema_version": "qwendex.ci.artifact_contract.v1",
              "source_commit": commit,
              "source_tree": tree,
              "status": "pass" if not blockers else "blocked",
              "blockers": blockers,
              "artifact_contract": contract,
          }
          Path(os.environ["QWENDEX_ARTIFACT_REPORT"]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          if blockers:
              raise SystemExit("; ".join(blockers))
          PY

      - name: Exercise a same-root downstream installation
        shell: bash
        run: |
          original_workspace="$PWD"
          export HOME="$RUNNER_TEMP/qwendex-install-home"
          mkdir -p "$HOME"
          git clone --no-local "$original_workspace" "$HOME/qwendex-dev"
          git -C "$HOME/qwendex-dev" checkout --detach "$GITHUB_SHA"
          test "$(git -C "$HOME/qwendex-dev" rev-parse HEAD)" = "$GITHUB_SHA"
          cd "$HOME/qwendex-dev"
          scripts/qwendex_install_deps --install --no-system --json > "$RUNNER_TEMP/qwendex-install-deps.json"
          scripts/qwendex_dev_env sync
          scripts/qwendex_dev_env sync
          before_codex_home=${CODEX_HOME-__unset__}
          source "$HOME/qwendex-dev/.qwendex-dev/env.sh"
          test "${CODEX_HOME-__unset__}" = "$before_codex_home"
          python3 - "$RUNNER_TEMP/qwendex-install-deps.json" <<'PY'
          import json
          import os
          import tomllib
          import sys
          from pathlib import Path

          install = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          if install.get("codex_compatible") is not True:
              raise SystemExit("downstream install did not provide the required Codex version")
          config = tomllib.loads(
              (Path(os.environ["QWENDEX_CODEX_HOME"]) / "config.toml").read_text(encoding="utf-8")
          )
          if len(config.get("projects", {})) != 1:
              raise SystemExit("same-root sync must emit exactly one Codex project table")
          PY
          codex features list >/dev/null
          qwendex-dev bootstrap --check --no-system
          scripts/qwendex check --health-mode strict --json
          scripts/qwendex doctor --health-mode strict --json
          scripts/qwendex eval --all --results-root "$RUNNER_TEMP/qwendex-downstream-eval" --json
          downstream_repo="$RUNNER_TEMP/qwendex-downstream-repo"
          git init -b main "$downstream_repo"
          QWENDEX_QDEX_DRY_RUN=1 qdex --repo "$downstream_repo" --json

      - name: Emit source-bound CI attestation
        env:
          QWENDEX_ARTIFACT_REPORT: ${{ runner.temp }}/qwendex-artifact-contract.json
          QWENDEX_CI_ATTESTATION: ${{ runner.temp }}/qwendex-ci-attestation.json
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          import subprocess
          from datetime import UTC, datetime
          from pathlib import Path

          def git(*args: str) -> str:
              return subprocess.run(
                  ["git", *args], text=True, capture_output=True, check=True
              ).stdout.strip()

          report_path = Path(os.environ["QWENDEX_ARTIFACT_REPORT"])
          report = json.loads(report_path.read_text(encoding="utf-8"))
          if report.get("status") != "pass":
              raise SystemExit("tracked artifact contract did not pass")
          run_id = int(os.environ["GITHUB_RUN_ID"])
          repository = os.environ["GITHUB_REPOSITORY"]
          payload = {
              "schema_version": "qwendex.ci.attestation.v1",
              "generated_at": datetime.now(UTC).isoformat(),
              "status": "pass",
              "conclusion": "success",
              "workflow": os.environ["GITHUB_WORKFLOW"],
              "workflow_ref": os.environ["GITHUB_WORKFLOW_REF"],
              "workflow_sha": os.environ["GITHUB_WORKFLOW_SHA"],
              "job": "verify",
              "event_name": os.environ["GITHUB_EVENT_NAME"],
              "ref": os.environ["GITHUB_REF"],
              "repository": repository,
              "commit": git("rev-parse", "HEAD"),
              "tree": git("rev-parse", "HEAD^{tree}"),
              "run_id": run_id,
              "run_attempt": int(os.environ["GITHUB_RUN_ATTEMPT"]),
              "run_url": f"https://github.com/{repository}/actions/runs/{run_id}",
              "checks": [
                  "artifact_contract",
                  "bash_syntax",
                  "compile",
                  "config_schema",
                  "downstream_install",
                  "json",
                  "lint",
                  "manager_production_contract",
                  "pytest",
                  "python_floor",
                  "strict_surface",
              ],
              "artifact_contract": {
                  "status": "pass",
                  "tree_manifest_sha256": report["artifact_contract"]["tree_manifest_sha256"],
                  "report_sha256": hashlib.sha256(report_path.read_bytes()).hexdigest(),
              },
          }
          Path(os.environ["QWENDEX_CI_ATTESTATION"]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY

      - name: Upload CI attestation
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: qwendex-ci-attestation-${{ github.sha }}
          path: |
            ${{ runner.temp }}/qwendex-ci-attestation.json
            ${{ runner.temp }}/qwendex-artifact-contract.json
          if-no-files-found: error
          retention-days: 30
