# Reference copy for a local LiteLLM proxy.
# Routes the public qwen-local alias to whichever OpenAI-compatible backend you run.
model_list:
  - model_name: qwen-local
    litellm_params:
      model: openai/qwen-local
      api_base: http://127.0.0.1:5000/v1
      api_key: no-key

litellm_settings:
  drop_params: true
  request_timeout: 1800
  set_verbose: false

general_settings:
  disable_spend_logs: true

router_settings:
  routing_strategy: simple-shuffle
